server:
  port: 8080

spring:
  application:
    name: aegis-backend

management:
  endpoints:
    web:
      exposure:
        include: health,info

# --- AI / LangChain4j (Ollama — local model, no API key needed) ---
langchain4j:
  ollama:
    chat-model:
      base-url: http://localhost:11434
      model-name: llama3.2
      temperature: 0.7
      timeout: PT120S
      log-requests: true
      log-responses: true
